name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-go:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
    
    - name: Test sheme
      run: cd sheme && go mod tidy && go test -v ./...
      
    - name: Test sensible (Go)
      run: cd sensible/go && go mod tidy && go test -v ./...
      
    - name: Test response
      run: cd response && go mod tidy && go test -v ./...

  test-python:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        cd sensible/py
        pip install pytest
        
    - name: Test sensible (Python)
      run: |
        cd sensible/py
        PYTHONPATH=src pytest
